name: Tests

on:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-${{ matrix.os }}

      - name: Run tests with race detector
        run: go test -race ./...

  integration-tests:
    name: Integration Tests - Installation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Build binaries for testing
        run: |
          mkdir -p bin
          go build -o bin/vectora ./cmd/daemon
          go build -o bin/vectora-tui ./cmd/tui
          go build -o bin/vectora-setup ./cmd/setup
          go build -o bin/mpm ./cmd/mpm
          go build -o bin/lpm ./cmd/lpm

      - name: Test binary execution on Linux
        if: runner.os == 'Linux'
        run: |
          bin/vectora --version || true
          bin/vectora-tui --version || true
          bin/mpm list
          bin/lpm list

      - name: Test binary execution on Windows
        if: runner.os == 'Windows'
        run: |
          .\bin\vectora.exe --version 2>$null || echo "Note: daemon may require systray context"
          .\bin\vectora-tui.exe --version 2>$null || echo "Note: TUI may require terminal"
          .\bin\mpm.exe list
          .\bin\lpm.exe list

      - name: Test binary execution on macOS
        if: runner.os == 'macOS'
        run: |
          bin/vectora --version || true
          bin/vectora-tui --version || true
          bin/mpm list
          bin/lpm list

  linter:
    name: Go Linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

  go-fmt:
    name: Go Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Check go fmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "❌ Files need formatting"
            gofmt -s -d .
            exit 1
          fi
          echo "✅ All files properly formatted"

  go-vet:
    name: Go Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Run go vet
        run: go vet ./...

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, linter, go-fmt, go-vet]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.unit-tests.result }}" == "failure" ] || \
             [ "${{ needs.integration-tests.result }}" == "failure" ] || \
             [ "${{ needs.linter.result }}" == "failure" ] || \
             [ "${{ needs.go-fmt.result }}" == "failure" ] || \
             [ "${{ needs.go-vet.result }}" == "failure" ]; then
            echo "❌ Some tests failed"
            exit 1
          fi
          echo "✅ All tests passed successfully"
