name: 🍎 macOS Build

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string # Ex: darwin_arm64, darwin_amd64
      arch:
        required: true
        type: string # Ex: arm64, amd64
      vectora_version:
        required: true
        type: string

jobs:
  build:
    name: 🏗️ Vectora Build (macOS, ${{ inputs.arch }})
    runs-on: macos-latest
    steps:
      - name: Checkout Vectora
        uses: actions/checkout@v4

      - name: Import dependency versions
        shell: bash
        run: |
          grep -v '^#' deps.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # Sincronizado com deps.env
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download and Extract llama.cpp Binaries (macOS)
        run: |
          URL="https://github.com/ggml-org/llama.cpp/releases/download/b8583/llama-b8583-bin-macos-arm64.tar.gz" # URL para ARM64
          # Precisa-se de uma lógica para escolher a URL correta para AMD64 se aplicável
          # Por enquanto, vou usar a ARM64 que foi fornecida
          if [ "${{ inputs.arch }}" == "amd64" ]; then
             echo "ATENÇÃO: A URL para llama.cpp AMD64 macOS não foi fornecida. Usando ARM64."
             # Aqui você pode mudar a URL se tiver uma para AMD64
          fi

          OUTPUT_DIR="tmp_llama_binaries"
          mkdir -p $OUTPUT_DIR
          wget -qO- $URL | tar -xz -C $OUTPUT_DIR

      - name: Build Web Frontend (Next.js)
        run: |
          cd src/web
          npm install
          npm run build

      - name: Prepare Release Directory
        shell: bash
        run: |
          mkdir -p release/${{ inputs.target }}/bin
          mkdir -p release/${{ inputs.target }}/web # Para o frontend estático
          # Copiar o frontend buildado
          cp -R src/web/out/* release/${{ inputs.target }}/web/

      - name: Build Vectora Binaries (Go)
        env:
          GOOS: darwin
          GOARCH: ${{ inputs.arch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_core ./cmd/core/main.go
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_tray ./cmd/tray/main.go
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_cli ./cmd/cli/main.go

      - name: Copy llama.cpp Binaries to Release
        shell: bash
        run: |
          # Encontra a pasta descompactada do llama-cpp (ex: llama-b8583)
          LLAMA_BIN_DIR=$(find tmp_llama_binaries -maxdepth 1 -mindepth 1 -type d -name "llama-b8583*" | head -n 1)
          if [ -z "$LLAMA_BIN_DIR" ]; then
            echo "Error: llama-cpp unpacked directory not found in tmp_llama_binaries!"
            exit 1
          fi
          # Copia os executáveis e bibliotecas importantes do llama.cpp para a pasta bin do release
          cp "$LLAMA_BIN_DIR"/llama-server release/${{ inputs.target }}/bin/
          cp "$LLAMA_BIN_DIR"/llama-embedding release/${{ inputs.target }}/bin/
          cp "$LLAMA_BIN_DIR"/*.dylib release/${{ inputs.target }}/bin/ 2>/dev/null || true # Copia todas as .dylib

      - name: Upload Vectora Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectora-macos-${{ inputs.arch }}-${{ inputs.vectora_version }}
          path: release/${{ inputs.target }}/
