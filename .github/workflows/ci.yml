name: CI/CD Pipeline (Main Orchestrator)

on:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*'
    paths-ignore:
      - 'README.md'
      - 'README.pt.md'
      - 'docs/**'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================================
  # ORCHESTRATION JOB - Controls the entire pipeline
  # ============================================================================
  orchestrate:
    name: Pipeline Orchestrator
    runs-on: ubuntu-latest
    outputs:
      should-test: ${{ steps.conditions.outputs.should-test }}
      should-build: ${{ steps.conditions.outputs.should-build }}
      should-release: ${{ steps.conditions.outputs.should-release }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Determine pipeline conditions
        id: conditions
        run: |
          # Determine which stages should run
          SHOULD_TEST="true"
          SHOULD_BUILD="false"
          SHOULD_RELEASE="false"

          if [[ "${{ github.event_name }}" == "push" && ! "${{ github.ref }}" =~ ^refs/tags/ ]]; then
            # Regular push (not a tag)
            SHOULD_BUILD="true"
          fi

          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            # Version tag detected
            SHOULD_RELEASE="true"
            SHOULD_BUILD="false"  # Release will build itself
          fi

          echo "should-test=$SHOULD_TEST" >> $GITHUB_OUTPUT
          echo "should-build=$SHOULD_BUILD" >> $GITHUB_OUTPUT
          echo "should-release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

      - name: Extract version
        id: version
        run: |
          VERSION="${{ github.ref }}"
          VERSION="${VERSION#refs/tags/}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Display pipeline configuration
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║           GitHub Actions CI/CD Pipeline                   ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📋 Pipeline Configuration:"
          echo "  Event:    ${{ github.event_name }}"
          echo "  Ref:      ${{ github.ref }}"
          echo "  Commit:   ${{ github.sha }}"
          echo ""
          echo "🔄 Scheduled Stages:"
          echo "  ✓ Tests:    ${{ steps.conditions.outputs.should-test }}"
          echo "  ✓ Build:    ${{ steps.conditions.outputs.should-build }}"
          echo "  ✓ Release:  ${{ steps.conditions.outputs.should-release }}"
          if [[ "${{ steps.conditions.outputs.should-release }}" == "true" ]]; then
            echo ""
            echo "🎉 Version: ${{ steps.version.outputs.version }}"
          fi

  # ============================================================================
  # STAGE 1: TESTS - Required for all pushes and PRs
  # ============================================================================
  tests:
    name: Tests - Required
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
          flags: unittests
          name: codecov-ubuntu

      - name: Run linter
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          args: --timeout=5m

      - name: Check go fmt
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "❌ Files need formatting"
            gofmt -s -d .
            exit 1
          fi
          echo "✅ All files properly formatted"

      - name: Run go vet
        run: go vet ./...

      - name: Test Summary
        if: always()
        run: |
          echo "✅ Tests completed"

  # ============================================================================
  # STAGE 2: BUILD - Runs after tests, only on commits (not on tags or PRs)
  # ============================================================================
  build:
    name: Build - Cross-Platform
    needs: tests
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      !startsWith(github.ref, 'refs/tags/') &&
      github.ref != 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'
          cache: true

      - name: Build all binaries
        run: bash build.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vectora-build-${{ github.run_id }}
          path: bin/
          retention-days: 7

      - name: Build Summary
        run: |
          echo "✅ Build completed successfully"
          echo "📦 Artifacts available for 7 days"

  # ============================================================================
  # STAGE 3: RELEASE - Runs only on version tags, depends on tests
  # ============================================================================
  release:
    name: Release - Create GitHub Release
    needs: tests
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Get commit range
        id: commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            echo "range=<first release>" >> $GITHUB_OUTPUT
            echo "url=https://github.com/Kaffyn/Vectora/commits/${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "range=$LAST_TAG..HEAD" >> $GITHUB_OUTPUT
            echo "url=https://github.com/Kaffyn/Vectora/compare/$LAST_TAG...HEAD" >> $GITHUB_OUTPUT
          fi

      - name: Prepare release notes
        id: release_notes
        run: |
          {
            echo "## 🎉 Vectora ${{ steps.version.outputs.version_number }}"
            echo ""
            echo "**Release Date:** ${{ steps.date.outputs.date }}"
            echo ""
            echo "### 📦 What's Included"
            echo "- 🖥️ **Daemon** - Local AI assistant service"
            echo "- 💻 **TUI** - Terminal user interface"
            echo "- 📦 **LPM** - Llama package manager"
            echo "- 🤖 **MPM** - Model package manager"
            echo "- 🔧 **Setup** - Installation utility"
            echo ""
            echo "### 🔗 Changes"
            echo "View commits: [${{ steps.commits.outputs.range }}](${{ steps.commits.outputs.url }})"
          } > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        run: |
          echo "✅ Release created successfully!"
          echo "🎉 Version: ${{ steps.version.outputs.version }}"
          echo "📦 Release: https://github.com/Kaffyn/Vectora/releases/${{ steps.version.outputs.version }}"

  # ============================================================================
  # FINAL: Pipeline Summary
  # ============================================================================
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [orchestrate, tests, build, release]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Display pipeline results
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║              🎯 Pipeline Execution Summary                 ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 Stage Results:"
          echo "  Tests:     ${{ needs.tests.result }}"
          echo "  Build:     ${{ needs.build.result }}"
          echo "  Release:   ${{ needs.release.result }}"
          echo ""
          echo "📋 Configuration:"
          echo "  Event:     ${{ github.event_name }}"
          echo "  Branch:    ${{ github.ref_name }}"
          echo "  Commit:    ${{ github.sha }}"
          echo ""

      - name: Pipeline failed
        if: failure()
        run: |
          echo "❌ Pipeline failed!"
          exit 1

      - name: Pipeline succeeded
        if: success()
        run: |
          echo "✅ Pipeline completed successfully!"
          echo ""
          echo "📚 Next Steps:"
          echo "  • Tests passed ✓"
          if [[ "${{ needs.build.result }}" == "success" ]]; then
            echo "  • Build completed ✓"
          fi
          if [[ "${{ needs.release.result }}" == "success" ]]; then
            echo "  • Release published ✓"
          fi
