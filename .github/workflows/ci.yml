name: 🚀 Pipeline Principal

on:
  push:
    branches: [master, develop]
    tags:
      - "v*"
      - "ext-claude-code-v*"
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      full_test:
        description: "Rodar suite completa de testes (incluindo lentos)"
        required: false
        default: "false"
        type: boolean

# Cancela runs anteriores do mesmo PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Detecta o que mudou para acionar só o necessário
  # ─────────────────────────────────────────────
  detect:
    name: Detectar mudanças
    runs-on: ubuntu-latest
    outputs:
      core:           ${{ steps.changes.outputs.core }}
      ext_vscode:     ${{ steps.changes.outputs.ext_vscode }}
      ext_geminicli:  ${{ steps.changes.outputs.ext_geminicli }}
      ext_claudecode: ${{ steps.changes.outputs.ext_claudecode }}
      is_release:     ${{ steps.changes.outputs.is_release }}
      is_ext_release: ${{ steps.changes.outputs.is_ext_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar arquivos alterados
        id: changes
        run: |
          # Tag de release do core
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          # Tag de release da extensão claude-code
          if [[ "${{ github.ref }}" =~ ^refs/tags/ext-claude-code-v ]]; then
            echo "is_ext_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_ext_release=false" >> $GITHUB_OUTPUT
          fi

          # Detecta mudanças por path (PR e push de branch)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          changed=$(git diff --name-only $BASE $HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)

          check() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "core=$(check           '^(cmd|core|internal)/|^go\.(mod|sum)$')" >> $GITHUB_OUTPUT
          echo "ext_vscode=$(check     '^extensions/vscode/')"                   >> $GITHUB_OUTPUT
          echo "ext_geminicli=$(check  '^extensions/geminicli/')"                >> $GITHUB_OUTPUT
          echo "ext_claudecode=$(check '^extensions/claude-code/')"              >> $GITHUB_OUTPUT

      - name: Resumo de detecção
        run: |
          echo "### Mudanças detectadas" >> $GITHUB_STEP_SUMMARY
          echo "| Componente       | Alterado |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Core (Go)        | ${{ steps.changes.outputs.core }} |"           >> $GITHUB_STEP_SUMMARY
          echo "| Ext. VS Code     | ${{ steps.changes.outputs.ext_vscode }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Gemini CLI  | ${{ steps.changes.outputs.ext_geminicli }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Claude Code | ${{ steps.changes.outputs.ext_claudecode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release Core     | ${{ steps.changes.outputs.is_release }} |"    >> $GITHUB_STEP_SUMMARY
          echo "| Release Ext CC   | ${{ steps.changes.outputs.is_ext_release }} |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────────
  # Testes do Core (Go)
  # ─────────────────────────────────────────────
  tests:
    name: Testes Core
    needs: detect
    if: needs.detect.outputs.core == 'true' || needs.detect.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/tests.yml
    with:
      full_test: ${{ github.event.inputs.full_test == 'true' }}

  # ─────────────────────────────────────────────
  # Build cross-platform (somente em commits, não em tags)
  # ─────────────────────────────────────────────
  build:
    name: Build Core
    needs: [detect, tests]
    if: |
      (needs.detect.outputs.core == 'true' || github.event_name == 'workflow_dispatch') &&
      !startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/build.yml

  # ─────────────────────────────────────────────
  # Segurança (roda junto com testes se core mudou)
  # ─────────────────────────────────────────────
  security:
    name: Segurança
    needs: detect
    if: needs.detect.outputs.core == 'true' || github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/security.yml

  # ─────────────────────────────────────────────
  # Extensão VS Code
  # ─────────────────────────────────────────────
  ext-vscode:
    name: Extensão VS Code
    needs: detect
    if: needs.detect.outputs.ext_vscode == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/extension-vscode.yml

  # ─────────────────────────────────────────────
  # Extensão Gemini CLI
  # ─────────────────────────────────────────────
  ext-geminicli:
    name: Extensão Gemini CLI
    needs: detect
    if: needs.detect.outputs.ext_geminicli == 'true' || startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/extension-geminicli.yml

  # ─────────────────────────────────────────────
  # Extensão Claude Code
  # ─────────────────────────────────────────────
  ext-claudecode:
    name: Extensão Claude Code
    needs: detect
    if: needs.detect.outputs.ext_claudecode == 'true' || needs.detect.outputs.is_ext_release == 'true'
    uses: ./.github/workflows/extension-claude-code.yml

  # ─────────────────────────────────────────────
  # Release do Core (apenas em tags v*)
  # ─────────────────────────────────────────────
  release:
    name: Release Core
    needs: [detect, tests]
    if: needs.detect.outputs.is_release == 'true'
    uses: ./.github/workflows/release.yml

  # ─────────────────────────────────────────────
  # Resumo final
  # ─────────────────────────────────────────────
  summary:
    name: Resumo do Pipeline
    runs-on: ubuntu-latest
    needs: [detect, tests, build, security, ext-vscode, ext-geminicli, ext-claudecode, release]
    if: always()
    steps:
      - name: Resultado
        run: |
          echo "### 🎯 Pipeline concluído" >> $GITHUB_STEP_SUMMARY
          echo "| Job              | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Testes           | ${{ needs.tests.result }} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Build            | ${{ needs.build.result }} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Segurança        | ${{ needs.security.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Ext. VS Code     | ${{ needs.ext-vscode.result }} |"   >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Gemini CLI  | ${{ needs.ext-geminicli.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Claude Code | ${{ needs.ext-claudecode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release          | ${{ needs.release.result }} |"      >> $GITHUB_STEP_SUMMARY
