name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [main, develop, dev]
  pull_request:
    branches: [main, develop, dev]
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/kaffyn/vectora
  PYTHON_VERSION: "3.13"
  VPS_BASE_URL: ${{ secrets.VPS_BASE_URL }}
  VPS_CONTAINER_OLD: vectora-mcp-old
  VPS_CONTAINER_NEW: vectora-mcp

jobs:
  # ─── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🔍 Run Ruff lint
        run: uv run ruff check src tests

      - name: 📋 Run Ruff format check
        run: uv run ruff format --check src tests

      - name: 📦 Check import sorting
        run: uv run isort --check-only src tests

  # ─── Type Check ───────────────────────────────────────────────────────────────
  type-check:
    name: 🔬 Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🔬 Run Mypy
        run: uv run mypy src

  # ─── Unit Tests ───────────────────────────────────────────────────────────────
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🧪 Run unit tests
        run: uv run pytest tests/unit -v --tb=short --cov=src --cov-report=xml
        env:
          LOG_LEVEL: DEBUG

      - name: 📊 Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  # ─── Integration Tests ────────────────────────────────────────────────────────
  integration-tests:
    name: 🔌 Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🧪 Run integration tests
        run: uv run pytest tests/integration -v --tb=short
        env:
          LOG_LEVEL: DEBUG
          TEST_MODE: "true"

  # ─── E2E Tests (MCP Resources) ────────────────────────────────────────────────
  e2e-tests:
    name: 🌐 E2E Tests (MCP)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🌐 Run E2E tests
        run: uv run pytest tests/e2e -v --tb=short
        env:
          LOG_LEVEL: DEBUG
          TEST_MODE: "true"

  # ─── Security Scan ────────────────────────────────────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python + UV Cache
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "uv"
          cache-dependency-path: "uv.lock"

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🔒 Bandit security check
        run: uv run bandit -r src -f json -o bandit-report.json
        continue-on-error: true

      - name: 🔒 Check hardcoded secrets
        run: |
          if grep -rE "sk_live_[A-Za-z0-9]{20,}|AKIA[0-9A-Z]{16}|api_key.*=.*['\"]" \
            --include="*.py" --include="*.env*" src/ 2>/dev/null; then
            echo "❌ Hardcoded secrets found!"
            exit 1
          fi
          echo "✅ No hardcoded secrets"

      - name: 🔒 Check dangerous env files
        run: |
          if git ls-files | grep -E '\.env\.(local|prod|production|vps)$'; then
            echo "❌ Sensitive .env files tracked by git!"
            exit 1
          fi
          echo "✅ No sensitive .env files committed"

  # ─── Docker Build & Push (Condicional) ────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests, security, type-check]
    if: |
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      contains(github.event.head_commit.message, '[deploy]')
    permissions:
      contents: read
      packages: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: 📝 Extract version
        id: meta
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tags=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:$VERSION" >> $GITHUB_OUTPUT

      - name: 🐳 Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      - name: 📢 Image pushed
        run: |
          echo "✅ Docker image pushed to GHCR"
          echo "🏷️ Tags: ${{ steps.meta.outputs.tags }}"

  # ─── Publish to PyPI ──────────────────────────────────────────────────────────
  publish-pypi:
    name: 📦 Publish to PyPI
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      contains(github.event.head_commit.message, '[deploy]')
    steps:
      - uses: actions/checkout@v4

      - name: 🔧 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install UV
        run: pip install uv

      - name: 📚 Sync dependencies (with dev tools)
        run: uv sync --all-extras

      - name: 🏗️ Build package
        run: |
          echo "🏗️ Building Vectora v${{ needs.docker-build.outputs.version }}..."
          uv build

      - name: 🚀 Publish to PyPI
        run: |
          echo "🚀 Publishing to PyPI..."
          uv run twine upload dist/* \
            --repository pypi \
            --username __token__ \
            --password "${{ secrets.PYPI_TOKEN }}" \
            --verbose
        env:
          TWINE_NON_INTERACTIVE: "true"

      - name: ✅ PyPI publish success
        run: |
          echo "✅ Published: pip install vectora==${{ needs.docker-build.outputs.version }}"

  # ─── Deploy VPS (Blue-Green) ──────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy VPS (Blue-Green)
    runs-on: ubuntu-latest
    needs: [docker-build, publish-pypi]
    if: |
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      contains(github.event.head_commit.message, '[deploy]')
    environment: production
    outputs:
      deployment_status: ${{ steps.deploy.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: 📝 Extract version
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 🚀 Blue-Green Deploy to VPS
        id: deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} bash -s << 'ENDDEPLOY'
          set -e

          # Configuration
          DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH }}"
          IMAGE="${{ env.IMAGE_NAME }}:latest"
          CONTAINER_OLD="${{ env.VPS_CONTAINER_OLD }}"
          CONTAINER_NEW="${{ env.VPS_CONTAINER_NEW }}"
          HEALTH_CHECK_URL="http://localhost:8000/health"
          HEALTH_CHECK_RETRIES=30
          HEALTH_CHECK_DELAY=2

          echo "🔐 [1/8] Login to GHCR..."
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u Kaffyn --password-stdin

          echo "📂 [2/8] Ensure deploy directory..."
          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          echo "💾 [3/8] Backup current state..."
          if [ -f docker-compose.yml ]; then
            cp docker-compose.yml docker-compose.backup.yml
            echo "✅ Backup created"
          fi

          echo "📥 [4/8] Pull new image..."
          docker pull "$IMAGE"

          echo "🔐 [5/8] Load environment variables..."
          # Create .env if not exists (from secrets or defaults)
          if [ ! -f .env ]; then
            cat > .env << 'ENVEOF'
          LOG_LEVEL=INFO
          GOOGLE_API_KEY=${{ secrets.VPS_GOOGLE_API_KEY }}
          VOYAGE_API_KEY=${{ secrets.VPS_VOYAGE_API_KEY }}
          LANGSMITH_API_KEY=${{ secrets.VPS_LANGSMITH_API_KEY }}
          ENVEOF
            echo "✅ .env created with defaults"
          fi

          echo "🟦 [6/8] Start new container (Blue-Green)..."
          docker run -d \
            --name "$CONTAINER_NEW" \
            --restart unless-stopped \
            --env-file .env \
            -p 8000:8000 \
            -v "$DEPLOY_PATH/data:/root/.vectora" \
            "$IMAGE" \
            vectora mcp-server

          echo "⏳ [7/8] Health check new container..."
          RETRY=0
          while [ $RETRY -lt $HEALTH_CHECK_RETRIES ]; do
            if docker exec "$CONTAINER_NEW" curl -sf "$HEALTH_CHECK_URL" > /dev/null 2>&1; then
              echo "✅ Health check passed after $((RETRY * HEALTH_CHECK_DELAY))s"
              break
            fi
            RETRY=$((RETRY + 1))
            if [ $RETRY -eq $HEALTH_CHECK_RETRIES ]; then
              echo "❌ Health check failed after $((HEALTH_CHECK_RETRIES * HEALTH_CHECK_DELAY))s"
              echo "📋 Container logs:"
              docker logs "$CONTAINER_NEW" | tail -20
              echo "🔙 Rolling back..."
              docker stop "$CONTAINER_NEW" || true
              docker rm "$CONTAINER_NEW" || true
              exit 1
            fi
            echo "⏳ Health check attempt $RETRY/$HEALTH_CHECK_RETRIES..."
            sleep $HEALTH_CHECK_DELAY
          done

          echo "🟩 [8/8] Switch traffic to new container..."
          # Stop old container (keep it for quick rollback)
          if docker ps -a | grep -q "^.*$CONTAINER_OLD"; then
            echo "🛑 Stopping old container..."
            docker stop "$CONTAINER_OLD" 2>/dev/null || true
            docker rename "$CONTAINER_OLD" "$CONTAINER_OLD-$(date +%s)" 2>/dev/null || true
          fi

          # Rename new to current
          docker rename "$CONTAINER_NEW" "$CONTAINER_OLD"

          echo "✅ Deployment successful!"
          docker ps -a | grep "$CONTAINER_OLD" || true

          ENDDEPLOY

      - name: ✅ Deployment status
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "🏷️ Version: ${{ steps.version.outputs.version }}"
          echo "🌐 VPS: ${{ secrets.VPS_HOST }}"
          echo "📝 Deploy path: ${{ secrets.VPS_DEPLOY_PATH }}"

      - name: ❌ Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "⚠️ Check VPS logs and attempt manual rollback if needed"
          exit 1

  # ─── Notification ─────────────────────────────────────────────────────────────
  notify:
    name: 🔔 Deployment Notification
    runs-on: ubuntu-latest
    needs: [docker-build, publish-pypi, deploy]
    if: |
      always() &&
      github.event_name == 'push' &&
      github.ref_name == 'main' &&
      contains(github.event.head_commit.message, '[deploy]')
    steps:
      - name: 📊 Summarize deployment
        run: |
          echo "## 🚀 Deployment Summary"
          echo ""
          echo "**Version**: ${{ needs.docker-build.outputs.version }}"
          echo "**Commit**: ${{ github.sha }}"
          echo "**Author**: ${{ github.actor }}"
          echo ""
          echo "### Deployment Status"
          echo "- Docker Build: ${{ needs.docker-build.result }}"
          echo "- PyPI Publish: ${{ needs.publish-pypi.result }}"
          echo "- VPS Deploy: ${{ needs.deploy.result }}"
          echo ""
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ **All systems operational!**"
            echo ""
            echo "📦 Available at:"
            echo "- PyPI: https://pypi.org/project/vectora/"
            echo "- Docker: https://ghcr.io/kaffyn/vectora"
            echo "- VPS: ${{ secrets.VPS_HOST }}"
          else
            echo "❌ **Deployment failed!**"
            echo ""
            echo "Check GitHub Actions logs for details."
          fi

  # ─── Final Report ─────────────────────────────────────────────────────────────
  report:
    name: 📊 Pipeline Report
    runs-on: ubuntu-latest
    needs:
      [lint, type-check, unit-tests, integration-tests, e2e-tests, security]
    if: always()
    steps:
      - name: 📊 Generate report
        run: |
          echo "## 🚀 CI/CD Pipeline Report"
          echo ""
          echo "### Test Results"
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| 🔍 Lint | ${{ needs.lint.result }} |"
          echo "| 🔬 Type Check | ${{ needs.type-check.result }} |"
          echo "| 🧪 Unit Tests | ${{ needs.unit-tests.result }} |"
          echo "| 🔌 Integration | ${{ needs.integration-tests.result }} |"
          echo "| 🌐 E2E Tests | ${{ needs.e2e-tests.result }} |"
          echo "| 🔒 Security | ${{ needs.security.result }} |"
          echo ""
          echo "**Branch**: ${{ github.ref_name }}"
          echo "**Commit**: ${{ github.sha }}"

      - name: ❌ Fail if critical tests failed
        if: |
          needs.lint.result == 'failure' ||
          needs.type-check.result == 'failure' ||
          needs.unit-tests.result == 'failure' ||
          needs.security.result == 'failure'
        run: exit 1
