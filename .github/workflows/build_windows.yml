name: 🪟 Windows Build

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string # Ex: windows_amd64.exe
      arch:
        required: true
        type: string # Ex: amd64
      vectora_version:
        required: true
        type: string

jobs:
  build:
    name: 🏗️ Vectora Build (Windows, ${{ inputs.arch }})
    runs-on: windows-latest
    steps:
      - name: Checkout Vectora
        uses: actions/checkout@v4

      - name: Import dependency versions
        shell: bash
        run: |
          grep -v '^#' deps.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23" # Sincronizado com deps.env
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download and Extract llama.cpp Binaries (Windows Vulkan)
        run: |
          $url = "https://github.com/ggml-org/llama.cpp/releases/download/b8583/llama-b8583-bin-win-vulkan-x64.zip"
          $outputDir = "tmp_llama_binaries" # Será relativo ao workspace
          mkdir -p $outputDir
          Invoke-WebRequest -Uri $url -OutFile "$outputDir/llama.zip"
          Expand-Archive "$outputDir/llama.zip" -DestinationPath "$outputDir" -Force
        shell: pwsh

      - name: Build Web Frontend (Next.js)
        run: |
          cd src/web
          npm install
          npm run build

      - name: Prepare Release Directory
        shell: bash
        run: |
          mkdir -p release/${{ inputs.target }}/bin
          mkdir -p release/${{ inputs.target }}/web # Para o frontend estático
          # Copiar o frontend buildado
          cp -R src/web/out/* release/${{ inputs.target }}/web/

      - name: Build Vectora Binaries (Go)
        env:
          GOOS: windows
          GOARCH: ${{ inputs.arch }}
          CGO_ENABLED: 1
        shell: bash
        run: |
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_core.exe ./cmd/core/main.go
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_tray.exe ./cmd/tray/main.go
          go build -ldflags="-s -w" -o release/${{ inputs.target }}/bin/vectora_cli.exe ./cmd/cli/main.go

      - name: Copy llama.cpp Binaries to Release
        shell: bash
        run: |
          # Encontra a pasta descompactada do llama-cpp (ex: llama-b8583)
          LLAMA_BIN_DIR=$(find tmp_llama_binaries -maxdepth 1 -mindepth 1 -type d -name "llama-b8583*" | head -n 1)
          if [ -z "$LLAMA_BIN_DIR" ]; then
            echo "Error: llama-cpp unpacked directory not found in tmp_llama_binaries!"
            exit 1
          fi
          # Copia os executáveis e DLLs importantes do llama.cpp para a pasta bin do release
          cp "$LLAMA_BIN_DIR"/llama-server.exe release/${{ inputs.target }}/bin/
          cp "$LLAMA_BIN_DIR"/llama-embedding.exe release/${{ inputs.target }}/bin/
          # Copiar DLLs ou outros arquivos importantes, se houver.
          # Por exemplo, se houver DLLs na raiz da pasta descompactada:
          # cp "$LLAMA_BIN_DIR"/*.dll release/${{ inputs.target }}/bin/ 2>/dev/null || true

      - name: Upload Vectora Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectora-windows-${{ inputs.arch }}-${{ inputs.vectora_version }}
          path: release/${{ inputs.target }}/
