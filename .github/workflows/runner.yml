name: Vectora CI/CD Pipeline

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  pull-requests: read
  checks: write
  statuses: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: "3.13"

jobs:
  setup:
    name: Setup & Cache
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Cache Python dependencies
        uses: actions/cache@v4
        id: cache-venv
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Sync dependencies (if cache miss)
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: uv sync --frozen --all-extras

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Run Ruff check
        run: uv run ruff check vectora tests

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Compile structure
        run: |
          uv run python -m compileall vectora

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Create .env from Secrets
        run: |
          cat <<'EOF' > .env
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY || 'test-key' }}
          COHERE_API_KEY=${{ secrets.COHERE_API_KEY || 'test-key' }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY || 'test-key' }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY || '' }}
          LLM_PROVIDER=google-genai
          ENABLE_WEB_SEARCH=false
          ENABLE_WEB_FETCH=false
          EOF

      - name: Run unit tests
        run: uv run pytest tests/ -v --cov=vectora --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml

  test-mcp:
    name: MCP Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Create .env from Secrets
        run: |
          cat <<'EOF' > .env
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY || 'test-key' }}
          COHERE_API_KEY=${{ secrets.COHERE_API_KEY || 'test-key' }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY || 'test-key' }}
          LANGSMITH_API_KEY=${{ secrets.LANGSMITH_API_KEY || '' }}
          LLM_PROVIDER=google-genai
          ENABLE_WEB_SEARCH=false
          ENABLE_WEB_FETCH=false
          EOF

      - name: Run MCP Integration Tests
        run: uv run pytest tests/e2e/test_mcp_resources.py tests/e2e/test_mcp_server_routes.py -v --tb=short

      - name: Run MCP Client Integration Test (Gemini CLI Simulation)
        run: uv run pytest tests/e2e/test_gemini_cli_mcp_integration.py -v --tb=short || true

  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Check for vulnerable dependencies
        run: |
          uv run pip install safety 2>/dev/null || echo "safety not available"
          safety check --json || true

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-unit, test-mcp, security]
    if: |
      (github.ref_name == 'main' || github.ref_name == 'master' || github.ref_name == 'dev') &&
      (contains(github.event.head_commit.message, '[deploy]') || contains(github.event.commits[0].message, '[deploy]') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            GIT_AUTH_TOKEN=${{ secrets.GITHUB_TOKEN }}

  report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [test-unit, test-mcp, lint, security]
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate test report
        run: |
          echo "# Vectora CI/CD Test Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Unit Tests**: ${{ needs.test-unit.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **MCP Tests**: ${{ needs.test-mcp.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Lint**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [test-unit, test-mcp, security]
    # Só roda em tags v* (releases); nunca em branches ou PRs
    if: startsWith(github.ref, 'refs/tags/v') && needs.test-unit.result == 'success' && needs.test-mcp.result == 'success'
    permissions:
      contents: read
      id-token: write # Trusted Publishing (OIDC)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Restore Python dependencies cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      # ── Key injection (LGPD: hard gate por código em privacy.py —
      # langsmith.Client(hide_inputs=True, hide_outputs=True) garante que
      # nenhum conteúdo de conversa sai da máquina do usuário)
      - name: Inject VECTORA_LANGSMITH_API_KEY into defaults.env
        env:
          VECTORA_LANGSMITH_API_KEY: ${{ secrets.VECTORA_LANGSMITH_API_KEY }}
        run: |
          if [ -z "$VECTORA_LANGSMITH_API_KEY" ]; then
            echo "⚠ VECTORA_LANGSMITH_API_KEY secret not set — building without telemetry key"
          else
            sed -i "s|^VECTORA_LANGSMITH_API_KEY=.*|VECTORA_LANGSMITH_API_KEY=${VECTORA_LANGSMITH_API_KEY}|" \
              vectora/defaults.env
            echo "✔ VECTORA_LANGSMITH_API_KEY injected into vectora/defaults.env"
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Verify wheel contains defaults.env
        run: |
          uv run python -c "
          import zipfile, sys
          from pathlib import Path
          wheels = list(Path('dist').glob('*.whl'))
          if not wheels:
              print('ERROR: no wheel found', file=sys.stderr); sys.exit(1)
          with zipfile.ZipFile(wheels[0]) as zf:
              found = any('defaults.env' in n for n in zf.namelist())
          if found:
              print(f'✔ defaults.env found in {wheels[0].name}')
          else:
              print('ERROR: defaults.env NOT in wheel!', file=sys.stderr); sys.exit(1)
          "

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [report, docker-build]
    # O deploy só deve rodar se o docker-build foi executado com sucesso na branch principal
    if: (github.ref_name == 'main' || github.ref_name == 'master') && always() && needs.docker-build.result == 'success'
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy application
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT $VPS_USER@$VPS_HOST "cd /opt/vectora && git fetch origin main && git reset --hard origin/main && docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest && docker compose down || true && docker compose up -d"

      - name: Verify deployment
        env:
          DEPLOY_KEY: ${{ secrets.VPS_DEPLOY_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key -p $VPS_PORT $VPS_USER@$VPS_HOST "docker compose -f /opt/vectora/docker-compose.yml ps"
