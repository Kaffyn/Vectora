name: Vectora CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-go:
    name: Go Tests (${{ matrix.os }})
    if: "contains(github.event.head_commit.message, '[gha]')" 
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Versão unificada

      - name: Install dependencies
        run: |
          go mod download
          go mod tidy

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Go Tests
        run: go test -v ./...

  lint-python:
    name: Python Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ruff
        run: pip install ruff

      - name: Run Ruff Check
        run: ruff check .

      - name: Run Ruff Format
        run: ruff format --check .
