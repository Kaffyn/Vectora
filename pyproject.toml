[project]
name = "vectora"
version = "0.0.1"
description = "vectora"
readme = "README.md"
license = "MIT"
authors = [{ name = "Machi" }]
requires-python = ">=3.14.5"
dependencies = [
  "aiosqlite>=0.21.0",
  "fastapi>=0.136.1",
  "lancedb>=0.30.2",
  "langchain>=1.0.8",
  "langchain-core>=1.0.7",
  "langchain-google-genai>=3.1.0",
  "langchain-ollama>=1.0.0",
  "langchain-text-splitters>=1.0.0",
  "langchain-voyageai>=0.3.3",
  "langgraph>=1.0.3",
  "langgraph-checkpoint-postgres>=3.0.1",
  "langgraph-checkpoint-sqlite>=3.0.0",
  "psycopg[binary]>=3.3.2",
  "rich>=14.2.0",
  "textual>=8.2.5",
]

[project.urls]
Homepage = "https://www.otaviomiranda.com.br/"

[project.optional-dependencies]
qdrant = [
    "langchain-qdrant>=1.1.0",
]
cache = [
    "langchain-redis>=0.2.5",
]
test = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
]

[tool.ruff]
line-length = 88
target-version = "py312"
fix = true
show-fixes = true
indent-width = 4
exclude = [".venv"]


[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "T201",   # Checks for print statements,
  "COM812", # Checks for the absence of trailing commas.
  "INP001", # Checks for packages that are missing an __init__.py file.
  "D",      # All pydocstyle (D)
  "ANN401", # Checks that function arguments are annotated with a more specific type than Any.
  "ERA001", # Checks for commented-out Python code.
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN201", "S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.isort]
known-first-party = [
  "checkpointer",
  "constants",
  "context",
  "env",
  "graph",
  "nodes",
  "prompts",
  "state",
  "tools",
  "utils",
]

[tool.pyright]
typeCheckingMode = "standard"
pythonVersion = "3.14"
include = ["src", "tests"]
exclude = [
  "**/venv",
  "**/.venv",
  "**/env",
  "**/.env",
  "**/node_modules",
  "**/__pycache__",
]
venv = ".venv"
venvPath = "."
executionEnvironments = [{ root = "src" }]

[tool.pytest.ini_options]
addopts = "-s --color=yes --tb=short"
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools]
package-dir = { "" = "src" }
