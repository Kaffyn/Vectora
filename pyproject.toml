[project]
name = "vectora"
version = "0.0.1"
description = "vectora"
readme = "README.md"
license = "MIT"
authors = [{ name = "Machi" }]
requires-python = ">=3.13,<3.15"
dependencies = [
  "aiosqlite",
  "fastapi",
  "fastmcp>=3.2.4",
  "lancedb",
  "langchain",
  "langchain-community",
  "langchain-core",
  "langchain-google-genai",
  "langchain-mcp-adapters>=0.2.2",
  "langchain-ollama",
  "langchain-text-splitters",
  "langchain-voyageai",
  "langgraph",
  "langgraph-checkpoint-sqlite",
  "qdrant-client<2",
  "rank-bm25",
  "rich",
  "sqlalchemy",
  "textual",
]

[project.urls]
Homepage = "https://www.otaviomiranda.com.br/"

[project.scripts]
vectora-cli = "src.run_main:main"
vectora-tui = "src.run_chat:run_chat"

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
]

[tool.ruff]
line-length = 88
target-version = "py312"
fix = true
show-fixes = true
indent-width = 4
exclude = [".venv"]


[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "T201",   # Checks for print statements,
  "COM812", # Checks for the absence of trailing commas.
  "INP001", # Checks for packages that are missing an __init__.py file.
  "D",      # All pydocstyle (D)
  "ANN401", # Checks that function arguments are annotated with a more specific type than Any.
  "ERA001", # Checks for commented-out Python code.
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN201", "S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.ruff.lint.isort]
known-first-party = [
  "checkpointer",
  "constants",
  "context",
  "env",
  "graph",
  "logging",
  "nodes",
  "prompts",
  "rag",
  "state",
  "testing",
  "tool_config",
  "tools",
  "utils",
]

[tool.pyright]
typeCheckingMode = "standard"
pythonVersion = "3.14"
include = ["src", "tests"]
exclude = [
  "**/venv",
  "**/.venv",
  "**/env",
  "**/.env",
  "**/node_modules",
  "**/__pycache__",
]
venv = ".venv"
venvPath = "."
executionEnvironments = [{ root = "src" }]

[tool.pytest.ini_options]
addopts = "-s --color=yes --tb=short"
pythonpath = ["src"]
testpaths = ["tests"]

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools]
package-dir = { "" = "src" }
