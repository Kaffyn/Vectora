version: "3.8"

services:
  vectora-mcp:
    image: ghcr.io/kaffyn/vectora:latest
    container_name: vectora-mcp
    restart: unless-stopped
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
    volumes:
      - vectora-data:/root/.vectora
      - ./data:/root/.vectora/data
    ports:
      # Se expor HTTP (opcional)
      # - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  vectora-data:
    driver: local

networks:
  default:
    driver: bridge
