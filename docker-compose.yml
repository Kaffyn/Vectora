version: "3.9"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: vectora-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vectora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpass}
      POSTGRES_DB: ${POSTGRES_DB:-vectora}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vectora}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vectora_network

  # Valkey (Redis-compatible cache)
  valkey:
    image: valkey/valkey:latest
    container_name: vectora-valkey
    environment:
      - REDIS_PASSWORD=${VALKEY_PASSWORD:-}
    volumes:
      - valkey_data:/data
    ports:
      - "${VALKEY_PORT:-6379}:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      ${VALKEY_PASSWORD:+--requirepass ${VALKEY_PASSWORD}}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vectora_network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: vectora-qdrant
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    ports:
      - "6333:6333"
    command: >
      ./qdrant --http-port 6333
      ${QDRANT_API_KEY:+--api-key ${QDRANT_API_KEY}}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vectora_network

  # Vectora API
  vectora:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vectora-api
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # Core
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_JSON: ${LOG_JSON:-false}

      # LLM Provider
      LLM_PROVIDER: ${LLM_PROVIDER:-google-genai}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.2}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-1}

      # Database
      DB_DSN: postgresql://${POSTGRES_USER:-vectora}:${POSTGRES_PASSWORD:-secretpass}@postgres:5432/${POSTGRES_DB:-vectora}

      # Valkey/Redis
      VALKEY_HOST: valkey
      VALKEY_PORT: 6379
      VALKEY_DB: 0
      VALKEY_PASSWORD: ${VALKEY_PASSWORD:-}
      VALKEY_URL: redis://${VALKEY_PASSWORD:+:${VALKEY_PASSWORD}@}valkey:6379/0
      CACHE_TTL: ${CACHE_TTL:-3600}
      ENABLE_SEMANTIC_CACHING: ${ENABLE_SEMANTIC_CACHING:-true}

      # Vector Store
      VECTOR_STORE_TYPE: ${VECTOR_STORE_TYPE:-qdrant}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTIONS: ${QDRANT_COLLECTIONS:-articles,wiki,api_docs,knowledge_base}

      # RAG
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-voyage-4}
      EMBEDDING_DIMS: ${EMBEDDING_DIMS:-1024}
      EMBEDDING_QUEUE_ENABLED: ${EMBEDDING_QUEUE_ENABLED:-true}
      EMBEDDING_QUEUE_DB: sqlite:////app/data/embedding_queue.db
      RAG_SEARCH_TOP_K: ${RAG_SEARCH_TOP_K:-10}
      RAG_SEARCH_MIN_SCORE: ${RAG_SEARCH_MIN_SCORE:-0.5}
      RERANKER_TYPE: ${RERANKER_TYPE:-bm25}
      RERANKER_MODEL: ${RERANKER_MODEL:-reranker-2.5-large}
      RAG_RERANKER_TOP_K: ${RAG_RERANKER_TOP_K:-5}

      # Tools
      ENABLE_WEB_SEARCH: ${ENABLE_WEB_SEARCH:-true}
      ENABLE_WEB_FETCH: ${ENABLE_WEB_FETCH:-true}
      WEB_FETCH_MAX_SIZE: ${WEB_FETCH_MAX_SIZE:-5000}
      WEB_FETCH_ALLOWED_DOMAINS: ${WEB_FETCH_ALLOWED_DOMAINS:-}
      ENABLE_DATABASE: ${ENABLE_DATABASE:-false}
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_ALLOWED_TABLES: ${DATABASE_ALLOWED_TABLES:-}
      ENABLE_MCP: ${ENABLE_MCP:-false}
      MCP_TRANSPORT_TYPE: ${MCP_TRANSPORT_TYPE:-http}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-}
      MCP_COMMAND: ${MCP_COMMAND:-}
      MCP_COMMAND_ARGS: ${MCP_COMMAND_ARGS:-}

      # API Server
      API_HOST: 0.0.0.0
      API_PORT: 8000
      REQUEST_TIMEOUT: ${REQUEST_TIMEOUT:-30}
      GRAPH_EXECUTION_TIMEOUT: ${GRAPH_EXECUTION_TIMEOUT:-300}
      ENABLE_RATE_LIMITING: ${ENABLE_RATE_LIMITING:-true}
      REQUESTS_PER_MINUTE: ${REQUESTS_PER_MINUTE:-60}

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${API_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - vectora_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  vectora_network:
    driver: bridge
    name: vectora_network

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  qdrant_data:
    driver: local
  qdrant_snapshots:
    driver: local
